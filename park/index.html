<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parquímetro Virtual</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <h1>Parquímetro Virtual</h1>
        
        <div class="tabela-precos">
            <p><strong>R$ 1,00</strong> - 30 min</p>
            <p><strong>R$ 2,00</strong> - 60 min</p>
            <p><strong>R$ 3,00</strong> - 120 min</p>
        </div>

        <div class="input-group">
            <label for="valor-pago">Valor inserido (R$):</label>
            <input type="number" id="valor-pago" placeholder="Ex: 2.50" min="0" step="0.01">
            <button id="btn-calcular">Emitir Ticket</button>
        </div>

        <div id="resultado" class="resultado oculto">

        </div>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
