<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Jogo de Adivinhação</h1>
        
        <p class="instrucoes">
            O computador pensou em um número entre 1 e 100.<br>
            Você consegue adivinhar qual é?
        </p>

        <div class="input-group">
            <input type="number" id="input-palpite" placeholder="Digite seu palpite" min="1" max="100">
            <button id="btn-chutar">Chutar</button>
        </div>

        <p id="mensagem-jogo">Aguardando seu palpite...</p>
        <p id="mensagem-tentativas">Tentativas restantes: <span id="contador-tentativas">10</span></p>
    </main>

    <script src="script.js"></script>
</body>
</html>
