<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Inteligente</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Cadastro de Usuário</h1>
            <p>Seus dados são salvos automaticamente.</p>
        </header>

        <form id="form-cadastro">
            <fieldset>
                <legend>Dados Pessoais</legend>
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: João da Silva">
                </div>
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="joao@email.com">
                </div>
            </fieldset>

            <fieldset>
                <legend>Endereço</legend>
                <div class="input-group">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9">
                    <small id="cep-erro" class="texto-erro oculto">CEP não encontrado ou inválido.</small>
                </div>
                
                <div class="input-row">
                    <div class="input-group flex-3">
                        <label for="rua">Logradouro</label>
                        <input type="text" id="rua" name="rua" placeholder="Rua, Avenida, etc.">
                    </div>
                    <div class="input-group flex-1">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" name="numero" placeholder="123">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" name="bairro">
                    </div>
                    <div class="input-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" name="cidade">
                    </div>
                    <div class="input-group flex-1">
                        <label for="uf">UF</label>
                        <input type="text" id="uf" name="uf" maxlength="2">
                    </div>
                </div>
            </fieldset>

            <div class="form-actions">
                <button type="button" id="btn-limpar" class="btn-secundario">Limpar Dados</button>
                <button type="submit" class="btn-primario">Finalizar Cadastro</button>
            </div>
        </form>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
